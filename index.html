<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>作業管理システム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header class="header">
      <div class="header-inner">
        <h1 class="logo">
          <span class="logo-icon">📋</span>
          作業管理システム
        </h1>
        <div style="display:flex;gap:10px;">
          <button class="btn btn-secondary" id="openRecurringBtn">
            🔄 定期作業
          </button>
          <button class="btn btn-primary" id="openModalBtn">
            ＋ 新規作業を追加
          </button>
        </div>
      </div>
    </header>

    <!-- フィルター・検索バー -->
    <div class="filter-bar">
      <div class="filter-bar-inner">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="作業内容・担当者で検索...">
        </div>
        <div class="filters">
          <select id="filterStatus" class="filter-select">
            <option value="">すべてのステータス</option>
            <option value="未実施">未実施</option>
            <option value="進行中">進行中</option>
            <option value="保留">保留</option>
            <option value="完了">完了</option>
          </select>
          <select id="filterPriority" class="filter-select">
            <option value="">すべての優先度</option>
            <option value="高">高</option>
            <option value="中">中</option>
            <option value="低">低</option>
          </select>
          <select id="filterAssignee" class="filter-select" id="filterAssignee">
            <option value="">すべての担当者</option>
          </select>
          <select id="sortOrder" class="filter-select">
            <option value="created_desc">登録日（新しい順）</option>
            <option value="created_asc">登録日（古い順）</option>
            <option value="deadline_asc">期限（近い順）</option>
            <option value="deadline_desc">期限（遠い順）</option>
            <option value="priority_desc">優先度（高い順）</option>
          </select>
        </div>
      </div>
    </div>

    <!-- サマリーカード -->
    <div class="summary-section">
      <div class="summary-grid">
        <div class="summary-card" data-status="">
          <div class="summary-number" id="countAll">0</div>
          <div class="summary-label">全作業</div>
        </div>
        <div class="summary-card status-pending" data-status="未実施">
          <div class="summary-number" id="countPending">0</div>
          <div class="summary-label">未実施</div>
        </div>
        <div class="summary-card status-inprogress" data-status="進行中">
          <div class="summary-number" id="countInProgress">0</div>
          <div class="summary-label">進行中</div>
        </div>
        <div class="summary-card status-hold" data-status="保留">
          <div class="summary-number" id="countHold">0</div>
          <div class="summary-label">保留</div>
        </div>
        <div class="summary-card status-done" data-status="完了">
          <div class="summary-number" id="countDone">0</div>
          <div class="summary-label">完了</div>
        </div>
      </div>
    </div>

    <!-- 作業一覧 -->
    <div class="main-content">
      <div class="task-list" id="taskList">
        <!-- タスクカードがここに挿入される -->
      </div>
      <div class="empty-state" id="emptyState" style="display:none;">
        <div class="empty-icon">📭</div>
        <p class="empty-text">作業がありません</p>
        <p class="empty-sub">「新規作業を追加」ボタンから作業を登録してください</p>
      </div>
    </div>
  </div>

  <!-- 作業追加・編集モーダル -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">新規作業を追加</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <form id="taskForm">
          <input type="hidden" id="taskId">

          <div class="form-row">
            <div class="form-group">
              <label class="form-label required">作業内容</label>
              <input type="text" id="taskTitle" class="form-input" placeholder="作業内容を入力..." required>
            </div>
          </div>

          <div class="form-row form-row-3">
            <div class="form-group">
              <label class="form-label required">優先度</label>
              <select id="taskPriority" class="form-select" required>
                <option value="">選択してください</option>
                <option value="高">🔴 高</option>
                <option value="中">🟡 中</option>
                <option value="低">🟢 低</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">期限</label>
              <input type="date" id="taskDeadline" class="form-input">
            </div>
            <div class="form-group">
              <label class="form-label required">ステータス</label>
              <select id="taskStatus" class="form-select" required>
                <option value="">選択してください</option>
                <option value="未実施">未実施</option>
                <option value="進行中">進行中</option>
                <option value="保留">保留</option>
                <option value="完了">完了</option>
              </select>
            </div>
          </div>

          <div class="form-row form-row-2">
            <div class="form-group">
              <label class="form-label required">担当者</label>
              <input type="text" id="taskAssignee" class="form-input" placeholder="担当者名を入力..." required>
            </div>
            <div class="form-group">
              <label class="form-label">進捗 (<span id="progressValue">0</span>%)</label>
              <input type="range" id="taskProgress" class="form-range" min="0" max="100" step="5" value="0">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">作業説明</label>
              <textarea id="taskDescription" class="form-textarea" rows="3" placeholder="作業の詳細説明を入力..."></textarea>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">備考</label>
              <textarea id="taskNotes" class="form-textarea" rows="2" placeholder="備考・メモを入力..."></textarea>
            </div>
          </div>

          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelBtn">キャンセル</button>
            <button type="submit" class="btn btn-primary" id="submitBtn">登録する</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- 詳細モーダル -->
  <div class="modal-overlay" id="detailOverlay">
    <div class="modal modal-detail">
      <div class="modal-header">
        <h2 class="modal-title" id="detailTitle">作業詳細</h2>
        <button class="modal-close" id="detailClose">✕</button>
      </div>
      <div class="modal-body" id="detailBody">
      </div>
    </div>
  </div>

  <!-- 削除確認モーダル -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2 class="modal-title">削除の確認</h2>
        <button class="modal-close" id="deleteClose">✕</button>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:1.5rem;">この作業を削除しますか？この操作は元に戻せません。</p>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="deleteCancelBtn">キャンセル</button>
          <button type="button" class="btn btn-danger" id="deleteConfirmBtn">削除する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 定期作業管理モーダル -->
  <div class="modal-overlay" id="recurringOverlay">
    <div class="modal modal-recurring">
      <div class="modal-header">
        <h2 class="modal-title">🔄 定期作業テンプレート</h2>
        <button class="modal-close" id="recurringClose">✕</button>
      </div>
      <div class="modal-body">
        <!-- テンプレート一覧 -->
        <div class="recurring-list" id="recurringList">
          <!-- テンプレートがここに挿入される -->
        </div>
        <div class="recurring-empty" id="recurringEmpty" style="display:none;">
          <p>テンプレートが登録されていません</p>
        </div>

        <!-- 追加フォームトグル -->
        <div style="margin-top:16px;">
          <button class="btn btn-secondary" id="toggleRecurringFormBtn" style="width:100%;">＋ テンプレートを追加</button>
        </div>

        <div id="recurringFormWrap" style="display:none;">
          <div style="border-top:1px solid var(--border);margin-top:16px;padding-top:16px;">
            <form id="recurringForm">
              <div class="form-row">
                <div class="form-group">
                  <label class="form-label required">作業内容</label>
                  <input type="text" id="rtTitle" class="form-input" placeholder="作業内容を入力..." required>
                </div>
              </div>

              <div class="form-row form-row-3">
                <div class="form-group">
                  <label class="form-label required">優先度</label>
                  <select id="rtPriority" class="form-select" required>
                    <option value="">選択</option>
                    <option value="高">🔴 高</option>
                    <option value="中">🟡 中</option>
                    <option value="低">🟢 低</option>
                  </select>
                </div>
                <div class="form-group">
                  <label class="form-label required">担当者</label>
                  <input type="text" id="rtAssignee" class="form-input" placeholder="担当者名" required>
                </div>
                <div class="form-group">
                  <label class="form-label">初期ステータス</label>
                  <select id="rtStatus" class="form-select">
                    <option value="未実施">未実施</option>
                    <option value="進行中">進行中</option>
                  </select>
                </div>
              </div>

              <div class="form-row form-row-3">
                <div class="form-group">
                  <label class="form-label required">繰り返しタイプ</label>
                  <select id="rtRepeatType" class="form-select" required>
                    <option value="">選択</option>
                    <option value="monthly_end">毎月末</option>
                    <option value="monthly_day">毎月X日</option>
                    <option value="weekly">毎週X曜日</option>
                  </select>
                </div>
                <div class="form-group" id="rtRepeatValueWrap" style="display:none;">
                  <label class="form-label required" id="rtRepeatValueLabel">繰り返し値</label>
                  <select id="rtRepeatValue" class="form-select"></select>
                </div>
                <div class="form-group">
                  <label class="form-label required">何日前に生成</label>
                  <input type="number" id="rtAdvanceDays" class="form-input" value="3" min="0" max="30" required>
                </div>
              </div>

              <div class="form-row">
                <div class="form-group">
                  <label class="form-label">説明（任意）</label>
                  <textarea id="rtDescription" class="form-textarea" rows="2" placeholder="作業の詳細説明..."></textarea>
                </div>
              </div>

              <div class="modal-footer" style="margin-top:0;">
                <button type="button" class="btn btn-secondary" id="cancelRecurringFormBtn">キャンセル</button>
                <button type="submit" class="btn btn-primary">テンプレートを登録</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
